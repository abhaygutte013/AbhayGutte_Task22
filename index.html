<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes floatUp {
            0% {
                transform: translateY(0px);
            }
    
            50% {
                transform: translateY(-10px);
            }
    
            100% {
                transform: translateY(0px);
            }
        }
    
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
    
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
    
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    
        .float {
            animation: floatUp 3s ease-in-out infinite;
        }
    
        .fade {
            animation: fadeIn 1s ease;
        }
    
        .zoom {
            animation: zoomIn 0.8s ease;
        }
    </style>
</head>

<body class="bg-white">

    <nav class="sticky top-0 z-50 bg-white border-b border-gray-200">

        <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-4">

            <h1 class="text-xl font-bold">
                + Project
            </h1>

            <ul class="flex gap-8 text-gray-600">

                <li><a href="#" class="hover:text-black">Product</a></li>

                <li><a href="#" class="hover:text-black">Solutions</a></li>

                <li><a href="#" class="hover:text-black">Resources</a></li>

                <li><a href="#" class="hover:text-black">Pricing</a></li>

                <li><a href="#" class=" font-bold text-black hover:font-medium">Log in</a></li>

            </ul>

            <button class="bg-black text-white px-5 py-2 rounded">
                Get AI free
            </button>

        </div>

    </nav>

    <section class="bg-gradient-to-br from-orange-100 via-orange-50 to-white py-10">

        <div class="max-w-7xl mx-auto px-6 ">

            <div class="text-center">

            <h1 class="text-5xl font-bold leading-tight fade">
                Write, plan, share.<br>
                With AI at your side.
            </h1>

            <p class="mt-3 text-gray-600 max-w-2xl mx-auto fade">
                It is the connected workspace where better,
                faster work happens. Now with AI.
            </p>

            <div class="relative mt-5 inline-block fade">
                    <button class="bg-black text-white px-6 py-3 rounded">

                        Get AI free →

                    </button>
                    <button
                        class="absolute left-48 top-0 bg-blue-600 text-white px-6 py-3 rounded shadow-md hover:bg-blue-700 transition whitespace-nowrap">
                        Request a demo
                    </button>
                    
                </div>

                <div class="relative mt-10 flex justify-center">

                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTF_YSeUKi76DvzXcUV4qzlH9ADDWVFTKN_55sW3XGwsg&s=10" alt="Project Workspace" class="w-[700px] rounded-lg shadow-xl zoom">
                      
                    <div
                        class="absolute left-10 top-20 bg-white rounded-xl shadow-lg p-4 w-52 z-20 float transition duration-300 hover:scale-105">
                        
                            <p class="font-semibold text-sm">
                                ✅ Tasks
                            </p>
                        
                            <p class="text-gray-500 text-sm mt-2">
                                12 tasks completed today
                            </p>
                        
                        </div>
                    
                    <div class="absolute right-10 top-10 bg-white rounded-xl shadow-lg p-4 w-48 z-30 float transition duration-300 hover:scale-105"
                        style="animation-delay:.3s;">
                        
                            <p class="font-semibold text-sm">
                                ✔ Project Status
                            </p>
                        
                            <p class="text-green-600 font-medium mt-2">
                                On Track
                            </p>
                        
                        </div>
                    
                    <div class="absolute right-6 bottom-8 bg-white rounded-xl shadow-lg p-4 w-56 z-20 float transition duration-300 hover:scale-105"
                        style="animation-delay:.6s;">
                        
                            <p class="font-semibold text-sm">
                                Team Activity
                            </p>
                        
                            <div class="flex items-center mt-3">
                        
                                <div class="flex -space-x-2">
                        
                                    <div class="w-8 h-8 rounded-full bg-red-300 border-2 border-white"></div>
                        
                                    <div class="w-8 h-8 rounded-full bg-blue-300 border-2 border-white"></div>
                        
                                    <div class="w-8 h-8 rounded-full bg-green-300 border-2 border-white"></div>
                        
                                </div>
                        
                                <span class="text-sm text-gray-500 ml-3">
                                    +5 online
                                </span>
                        
                            </div>
                        
                        </div>
                        
                        </div>
                        
                        </div>
                        
                        </div>
                        
                        </section>
                        
                    <div class="fixed bottom-6 right-6 z-50 float">
                    
                        <button
                            class="bg-black text-white w-14 h-14 rounded-full shadow-xl hover:bg-gray-800 transition duration-300 hover:scale-110">
                    
                            💬
                    
                        </button>
                    
                    </div>
                        
                        </body>
                        
                        </html>
