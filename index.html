<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Workspace</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white">

    <nav class="border-b">

        <div class="max-w-7xl mx-auto flex justify-between items-center p-5">

            <h1 class="text-xl font-bold">
                + Project
            </h1>

            <ul class="flex gap-6 text-sm">

                <li>
                    <a href="#" class="text-gray-600 hover:text-black">
                        Product
                    </a>
                </li>

                <li>
                    <a href="#" class="text-gray-600 hover:text-black">
                        Solutions
                    </a>
                </li>

                <li>
                    <a href="#" class="text-gray-600 hover:text-black">
                        Resources
                    </a>
                </li>

                <li>
                    <a href="#" class="text-gray-600 hover:text-black">
                        Pricing
                    </a>
                </li>

                <li>
                    <a href="#" class="font-semibold">
                        Log in
                    </a>
                </li>

            </ul>

            <button class="bg-black text-white px-4 py-2 rounded">
                Get AI Free
            </button>

        </div>

    </nav>

    <section class="bg-orange-50 py-10">

        <div class="max-w-6xl mx-auto text-center">

            <h1 class="text-5xl font-bold">

                Write, plan, share.<br>

                With AI at your side.

            </h1>

            <p class="text-gray-600 mt-4">

                It is the connected workspace where better,
                faster work happens. Now with AI.

            </p>

            <div class="mt-6">

                <button class="bg-black text-white px-5 py-2 rounded">

                    Get AI Free →

                </button>

                <button class="bg-blue-600 text-white px-5 py-2 rounded ml-3">

                    Request a Demo

                </button>

            </div>

            <div class="relative mt-12 flex justify-center">

                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTF_YSeUKi76DvzXcUV4qzlH9ADDWVFTKN_55sW3XGwsg&s=10"
                    alt="Project Workspace" class="w-[650px] rounded shadow">
                                    <!-- Left Card -->
                                    
                                    <div
                                        class="absolute left-0 top-16 bg-white border rounded p-3 shadow w-40 transition hover:-translate-y-1 hover:shadow-lg">
                                    
                                        <h3 class="font-semibold text-sm">
                                            📋 Tasks
                                        </h3>
                                    
                                        <p class="text-xs text-gray-500 mt-2">
                                            12 tasks completed today
                                        </p>
                                    
                                    </div>
                                    
                                    <!-- Right Top Card -->
                                    
                                    <div
                                        class="absolute right-0 top-8 bg-white border rounded p-3 shadow w-44 transition hover:-translate-y-1 hover:shadow-lg">
                                    
                                        <h3 class="font-semibold text-sm">
                                            ✔ Project Status
                                        </h3>
                                    
                                        <p class="text-green-600 text-sm mt-2">
                                            On Track
                                        </p>
                                    
                                    </div>
                                    
                                    <!-- Right Bottom Card -->
                                    
                                    <div
                                        class="absolute right-0 bottom-8 bg-white border rounded p-3 shadow w-48 transition hover:-translate-y-1 hover:shadow-lg">
                                    
                                        <h3 class="font-semibold text-sm">
                                            Team Activity
                                        </h3>
                                    
                                        <div class="flex items-center mt-2">
                                    
                                            <div class="flex -space-x-2">
                                    
                                                <div class="w-7 h-7 bg-red-300 rounded-full border"></div>
                                    
                                                <div class="w-7 h-7 bg-blue-300 rounded-full border"></div>
                                    
                                                <div class="w-7 h-7 bg-green-300 rounded-full border"></div>
                                    
                                            </div>
                                    
                                            <p class="text-xs text-gray-500 ml-2">
                                                +5 Online
                                            </p>
                                    
                                        </div>
                                    
                                    </div>
                                    
                                    </div>
                                    
                                    </div>
                                    
                                    </section>
                                    
                                    <div class="fixed bottom-6 right-6">
                                    
                                        <button class="bg-black text-white w-12 h-12 rounded shadow transition hover:scale-110">
                                            💬
                                        </button>
                                    
                                    </div>
                                    
                                    </body>
                                    
                                    </html>
